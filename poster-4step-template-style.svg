<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="4-step infographic poster">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f2f4f7"/>
      <stop offset="100%" stop-color="#e7ebf0"/>
    </linearGradient>
    <filter id="cardShadow" x="-20%" y="-20%" width="160%" height="170%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#1f2a35" flood-opacity="0.15"/>
    </filter>
    <style>
      .title { font: 700 36px 'Segoe UI', Arial, sans-serif; fill: #2f3c4a; letter-spacing: 2px; }
      .main { font: 800 54px 'Segoe UI', Arial, sans-serif; fill: #1f2a35; letter-spacing: 2px; }
      .step { font: 800 28px 'Segoe UI', Arial, sans-serif; }
      .head { font: 800 30px 'Segoe UI', Arial, sans-serif; fill: #2a3440; }
      .body { font: 500 24px 'Segoe UI', Arial, sans-serif; fill: #5a6875; }
      .foot { font: 700 24px 'Segoe UI', Arial, sans-serif; fill: #2f3c4a; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <text x="800" y="82" text-anchor="middle" class="title">VINFAST AI ADVISOR</text>
  <rect x="705" y="152" width="34" height="7" rx="3" fill="#1f6e9c"/>
  <rect x="748" y="152" width="34" height="7" rx="3" fill="#e0b814"/>
  <rect x="791" y="152" width="34" height="7" rx="3" fill="#d82323"/>
  <rect x="834" y="152" width="34" height="7" rx="3" fill="#1cb3c8"/>

  <line x1="130" y1="740" x2="1470" y2="740" stroke="#b9c3cc" stroke-width="4"/>

  <g transform="translate(180,220)" filter="url(#cardShadow)">
    <rect x="0" y="0" width="280" height="430" rx="16" fill="#ffffff"/>
    <path d="M90 430h100l-50 42z" fill="#1f6e9c"/>
    <rect x="0" y="392" width="280" height="38" fill="#1f6e9c"/>
    <path d="M110 34h60l16 16v26l-16 16h-60l-16-16V50z" fill="none" stroke="#1f6e9c" stroke-width="5"/>
    <circle cx="140" cy="63" r="14" fill="#f2f6fa" stroke="#c7d4df" stroke-width="3"/>
    <text x="140" y="147" text-anchor="middle" class="step" fill="#1f6e9c">STEP 01</text>
    <text x="140" y="190" text-anchor="middle" class="head">PROBLEM</text>
    <text x="28" y="242" class="body">Buyers struggle to map</text>
    <text x="28" y="276" class="body">budget and usage to the</text>
    <text x="28" y="310" class="body">right EV model quickly.</text>
  </g>

  <g transform="translate(520,220)" filter="url(#cardShadow)">
    <rect x="0" y="0" width="280" height="430" rx="16" fill="#ffffff"/>
    <path d="M90 430h100l-50 42z" fill="#e0b814"/>
    <rect x="0" y="392" width="280" height="38" fill="#e0b814"/>
    <path d="M110 34h60l16 16v26l-16 16h-60l-16-16V50z" fill="none" stroke="#e0b814" stroke-width="5"/>
    <circle cx="140" cy="63" r="14" fill="#fff9dc" stroke="#f0dd86" stroke-width="3"/>
    <text x="140" y="147" text-anchor="middle" class="step" fill="#b28f00">STEP 02</text>
    <text x="140" y="190" text-anchor="middle" class="head">SOLUTION</text>
    <text x="28" y="242" class="body">AI intake + top 3 car</text>
    <text x="28" y="276" class="body">recommendations +</text>
    <text x="28" y="310" class="body">5-year cost calculator.</text>
  </g>

  <g transform="translate(860,220)" filter="url(#cardShadow)">
    <rect x="0" y="0" width="280" height="430" rx="16" fill="#ffffff"/>
    <path d="M90 430h100l-50 42z" fill="#d82323"/>
    <rect x="0" y="392" width="280" height="38" fill="#d82323"/>
    <path d="M110 34h60l16 16v26l-16 16h-60l-16-16V50z" fill="none" stroke="#d82323" stroke-width="5"/>
    <circle cx="140" cy="63" r="14" fill="#ffe9e9" stroke="#f0aaaa" stroke-width="3"/>
    <text x="140" y="147" text-anchor="middle" class="step" fill="#b10f0f">STEP 03</text>
    <text x="140" y="190" text-anchor="middle" class="head">AUTO / AUG</text>
    <text x="28" y="242" class="body">Augmentation mode:</text>
    <text x="28" y="276" class="body">AI suggests, users and</text>
    <text x="28" y="310" class="body">sales advisors decide.</text>
  </g>

  <g transform="translate(1200,220)" filter="url(#cardShadow)">
    <rect x="0" y="0" width="280" height="430" rx="16" fill="#ffffff"/>
    <path d="M90 430h100l-50 42z" fill="#1cb3c8"/>
    <rect x="0" y="392" width="280" height="38" fill="#1cb3c8"/>
    <path d="M110 34h60l16 16v26l-16 16h-60l-16-16V50z" fill="none" stroke="#1cb3c8" stroke-width="5"/>
    <circle cx="140" cy="63" r="14" fill="#e7fbff" stroke="#9adce7" stroke-width="3"/>
    <text x="140" y="147" text-anchor="middle" class="step" fill="#0f8ea0">STEP 04</text>
    <text x="140" y="190" text-anchor="middle" class="head">DEMO</text>
    <text x="28" y="242" class="body">React + Vite UI,</text>
    <text x="28" y="276" class="body">OpenAI tools,</text>
    <text x="28" y="310" class="body">lead form ready.</text>
  </g>

  <circle cx="320" cy="740" r="17" fill="#ffffff" stroke="#1f6e9c" stroke-width="5"/>
  <circle cx="660" cy="740" r="17" fill="#ffffff" stroke="#e0b814" stroke-width="5"/>
  <circle cx="1000" cy="740" r="17" fill="#ffffff" stroke="#d82323" stroke-width="5"/>
  <circle cx="1340" cy="740" r="17" fill="#ffffff" stroke="#1cb3c8" stroke-width="5"/>

  <text x="800" y="835" text-anchor="middle" class="foot">Problem -> Solution -> Auto/Aug -> Demo</text>
</svg>
