<body class="bg-surface text-on-surface antialiased overflow-x-hidden" data-mode="connect">
<!-- Suppression of TopNavBar and BottomNavBar for transactional flow as per Shell Visibility Rule -->
<main class="min-h-[1024px] flex items-center justify-center relative p-6 md:p-12 overflow-hidden" data-stitch-vh="min-h-[1024px]===min-h-screen">
<!-- Subtle background texture/element for Editorial Precision -->
<div class="absolute top-0 right-0 w-1/3 h-full bg-surface-container-low -z-10 transition-all"></div>
<div class="absolute bottom-20 left-10 opacity-10 -z-10">
</div>
<div class="w-full max-w-7xl flex flex-col md:flex-row items-center justify-center gap-16 lg:gap-24">
<!-- Signup Form Container -->
<div class="w-full md:w-[480px] bg-surface-container-lowest p-8 md:p-12 rounded-xl shadow-[0_12px_32px_-4px_rgba(45,52,53,0.08)]">
<!-- Mobile Branding -->
<div class="md:hidden mb-8">
<span class="text-lg font-bold tracking-widest text-primary uppercase brand-font">Monolith</span>
</div>
<header class="mb-10">
<h2 class="text-3xl font-bold text-on-surface mb-2 tracking-tight">Create Account</h2>
<p class="text-on-surface-variant text-sm">Experience the premium standard of financial management.</p>
</header>
<form class="space-y-6">
<!-- Full Name Field -->
<div class="space-y-2">
<label class="block text-xs font-semibold text-on-surface-variant uppercase tracking-wider" for="name">Full Name</label>
<div class="relative">
<input class="w-full px-4 py-3.5 bg-surface-container-lowest border border-outline-variant/20 rounded-md focus:outline-none focus:ring-2 focus:ring-surface-tint/20 focus:border-primary transition-all placeholder:text-outline-variant/60 text-on-surface font-medium" id="name" placeholder="Alexander Hamilton" type="text">
<div class="absolute inset-y-0 right-4 flex items-center pointer-events-none text-outline-variant">
<span class="material-symbols-outlined text-[20px]">person</span>
</div>
</div>
</div>
<!-- Email Field -->
<div class="space-y-2">
<label class="block text-xs font-semibold text-on-surface-variant uppercase tracking-wider" for="email">Email Address</label>
<div class="relative">
<input class="w-full px-4 py-3.5 bg-surface-container-lowest border border-outline-variant/20 rounded-md focus:outline-none focus:ring-2 focus:ring-surface-tint/20 focus:border-primary transition-all placeholder:text-outline-variant/60 text-on-surface font-medium" id="email" placeholder="alexander@monolith.com" type="email">
<div class="absolute inset-y-0 right-4 flex items-center pointer-events-none text-outline-variant">
<span class="material-symbols-outlined text-[20px]">mail</span>
</div>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<label class="block text-xs font-semibold text-on-surface-variant uppercase tracking-wider" for="password">Secure Password</label>
<div class="relative">
<input class="w-full px-4 py-3.5 bg-surface-container-lowest border border-outline-variant/20 rounded-md focus:outline-none focus:ring-2 focus:ring-surface-tint/20 focus:border-primary transition-all placeholder:text-outline-variant/60 text-on-surface font-medium" id="password" placeholder="••••••••••••" type="password">
<div class="absolute inset-y-0 right-4 flex items-center pointer-events-none text-outline-variant">
<span class="material-symbols-outlined text-[20px]">lock</span>
</div>
</div>
<p class="text-[10px] text-outline-variant">Must be at least 12 characters with 1 symbol.</p>
</div>
<!-- Terms Checkbox -->
<div class="flex items-start gap-3 py-2">
<input class="mt-1 w-4 h-4 text-primary border-outline-variant/40 rounded focus:ring-primary/20" id="terms" type="checkbox">
<label class="text-sm text-on-surface-variant leading-tight" for="terms">
                            I agree to the <a class="text-tertiary font-medium hover:underline" href="#">Terms of Service</a> and <a class="text-tertiary font-medium hover:underline" href="#">Privacy Policy</a>.
                        </label>
</div>
<!-- Primary Action -->
<button class="w-full bg-primary text-on-primary font-bold py-4 rounded-md shadow-md hover:-translate-y-0.5 active:translate-y-0 active:opacity-90 transition-all duration-300 tracking-wide" type="submit">
                        Create Account
                    </button>
<!-- Alternate Signup Method -->
<div class="relative flex items-center justify-center py-4">
<div class="absolute w-full h-[1px] bg-outline-variant/20"></div>
<span class="relative px-4 bg-surface-container-lowest text-xs text-outline-variant font-medium">OR REGISTER WITH</span>
</div>
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-2 px-4 py-3 bg-primary-container text-on-primary-container text-sm font-semibold rounded-md hover:opacity-80 transition-all" type="button">
<svg class="w-4 h-4" viewBox="0 0 24 24"><path d="M21.35,11.1H12.18V13.83H18.69C18.36,17.64 15.19,19.27 12.19,19.27C8.36,19.27 5,16.25 5,12C5,7.9 8.2,4.73 12.2,4.73C15.29,4.73 17.1,6.7 17.1,6.7L19,4.72C19,4.72 16.56,2 12.1,2C6.42,2 2.03,6.8 2.03,12C2.03,17.05 6.16,22 12.25,22C17.6,22 21.5,18.33 21.5,12.91C21.5,11.76 21.35,11.1 21.35,11.1V11.1Z" fill="currentColor"></path></svg>
                            Google
                        </button>
<button class="flex items-center justify-center gap-2 px-4 py-3 bg-primary-container text-on-primary-container text-sm font-semibold rounded-md hover:opacity-80 transition-all" type="button">
<svg class="w-4 h-4" viewBox="0 0 24 24"><path d="M12,2C6.47,2 2,6.47 2,12C2,17.53 6.47,22 12,22C17.53,22 22,17.53 22,12C22,6.47 17.53,2 12,2M15.71,12.71L12.71,15.71C12.5,15.92 12.25,16 12,16C11.75,16 11.5,15.92 11.29,15.71L8.29,12.71C7.9,12.32 7.9,11.68 8.29,11.29C8.68,10.9 9.32,10.9 9.71,11.29L11,12.59V8C11,7.45 11.45,7 12,7C12.55,7 13,7.45 13,8V12.59L14.29,11.29C14.68,10.9 15.32,10.9 15.71,11.29C16.1,11.68 16.1,12.32 15.71,12.71Z" fill="currentColor"></path></svg>
                            SSO
                        </button>
</div>
</form>
<footer class="mt-12 pt-6 border-t border-outline-variant/10 text-center">
<p class="text-on-surface-variant text-sm">
                        Already have an account? 
                        <a class="text-tertiary font-bold ml-1 hover:underline" href="#">Login</a>
</p>
</footer>
</div>
</div>
</main>
<!-- Essential Footer as per JSON Configuration -->
<footer class="w-full border-t border-[#e2e2e2] bg-[#f9f9f9] dark:bg-gray-950">
<div class="px-12 py-8 max-w-screen-2xl mx-auto text-center">
    <!-- Footer content cleared -->
</div>
</footer>
</body></html>
