<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Chat + Recommend + Calculator frames</title>
<style>
body{font-family:system-ui,sans-serif;margin:1rem;max-width:720px}
section{border:1px solid #ccc;border-radius:8px;padding:1rem;margin-bottom:1rem}
</style>
</head>
<body>
<h1>Prototype shell</h1>
<section id="chat"><h2>Chat</h2></section>
<section id="recos"><h2>Top 3</h2></section>
<section id="calc"><h2>Calculator</h2></section>
<section id="lead"><h2>Lead form</h2></section>
<script type="module">
const DATA_URL = new URL("../../data/standard_contract.json", import.meta.url);
const data = await fetch(DATA_URL).then(r => r.json());
document.getElementById("recos").append(
  Object.assign(document.createElement("pre"), { textContent: JSON.stringify(data.recommendation_output_example, null, 2) })
);
</script>
</body>
</html>
